services:
  - type: web
    name: agent-control-messenger-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - key: ACM_SERVICE_NAME
        value: agent-control-messenger-backend
      - key: ACM_FRONTEND_ORIGIN
        sync: false
      - key: ACM_ENV
        value: production
      - key: ACM_ALLOW_DEMO_BOOTSTRAP
        value: 'false'
      - key: PORT
        value: 8000
